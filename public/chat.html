<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TaskMate — Chat</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<script src="https://cdn.socket.io/4.6.1/socket.io.min.js"></script>
<style>
:root{
  --bg:#080b10;--bg2:#0d1117;--bg3:#111620;--card:#131b27;--card2:#172032;
  --border:#1e2d42;--border2:#253448;
  --accent:#4f9cf9;--accent2:#7c5cfc;--accent3:#f97b4f;
  --green:#3ecf8e;--text:#e8edf5;--muted:#7a8fa6;--faint:#192233;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--text);font-family:'DM Sans',sans-serif;height:100vh;display:flex;flex-direction:column;overflow:hidden}
h1,h2,h3,h4{font-family:'Syne',sans-serif}

/* TOP BAR */
.topbar{height:56px;background:var(--bg2);border-bottom:1px solid var(--border);display:flex;align-items:center;padding:0 1.5rem;gap:1rem;flex-shrink:0}
.logo{font-family:'Syne',sans-serif;font-weight:800;font-size:1.2rem;background:linear-gradient(135deg,var(--accent),var(--accent2));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.logo span{-webkit-text-fill-color:var(--accent3)}
.back-btn{padding:.4rem .9rem;border-radius:8px;background:none;border:1px solid var(--border);color:var(--muted);font-size:.8rem;cursor:pointer;transition:all .2s}
.back-btn:hover{border-color:var(--accent);color:var(--accent)}

/* LAYOUT */
.chat-layout{flex:1;display:grid;grid-template-columns:300px 1fr;overflow:hidden}

/* SIDEBAR */
.rooms-panel{background:var(--bg2);border-right:1px solid var(--border);display:flex;flex-direction:column;overflow:hidden}
.rooms-header{padding:1rem;border-bottom:1px solid var(--border)}
.rooms-title{font-size:.9rem;font-weight:800;margin-bottom:.7rem}
.search-wrap{display:flex;align-items:center;gap:.5rem;background:var(--bg3);border:1px solid var(--border);border-radius:10px;padding:.45rem .8rem;transition:border-color .2s}
.search-wrap:focus-within{border-color:var(--accent)}
.search-wrap input{background:none;border:none;outline:none;color:var(--text);font-size:.83rem;width:100%}
.search-wrap input::placeholder{color:var(--muted)}
.rooms-list{flex:1;overflow-y:auto}
.room-item{display:flex;align-items:center;gap:.8rem;padding:.9rem 1rem;border-bottom:1px solid rgba(30,45,66,.5);cursor:pointer;transition:background .2s;position:relative}
.room-item:hover,.room-item.active{background:var(--faint)}
.room-item.active{border-right:2px solid var(--accent)}
.room-ava{width:40px;height:40px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:1rem;font-weight:700;color:#fff;flex-shrink:0;position:relative}
.online-dot{position:absolute;bottom:1px;right:1px;width:10px;height:10px;border-radius:50%;background:var(--green);border:2px solid var(--bg2)}
.room-info{flex:1;overflow:hidden}
.room-name{font-weight:700;font-size:.88rem;margin-bottom:.15rem}
.room-last{font-size:.76rem;color:var(--muted);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.room-meta{display:flex;flex-direction:column;align-items:flex-end;gap:.3rem;flex-shrink:0}
.room-time{font-size:.68rem;color:var(--muted)}
.unread-badge{background:var(--accent);color:#fff;font-size:.62rem;font-weight:700;padding:.15rem .45rem;border-radius:999px}
.room-task{font-size:.68rem;color:var(--accent);margin-top:.1rem;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:180px}

/* CHAT WINDOW */
.chat-window{display:flex;flex-direction:column;overflow:hidden}
.chat-header{
  padding:.9rem 1.4rem;border-bottom:1px solid var(--border);
  display:flex;align-items:center;gap:.9rem;flex-shrink:0;
  background:rgba(8,11,16,.6);backdrop-filter:blur(12px);
}
.ch-ava{width:40px;height:40px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:1rem;font-weight:700;color:#fff;flex-shrink:0}
.ch-name{font-family:'Syne',sans-serif;font-weight:700;font-size:.95rem}
.ch-status{font-size:.75rem;color:var(--green);margin-top:.05rem}
.ch-actions{margin-left:auto;display:flex;gap:.5rem}
.ch-btn{width:34px;height:34px;border-radius:8px;background:var(--bg3);border:1px solid var(--border);color:var(--muted);font-size:.9rem;cursor:pointer;transition:all .2s;display:flex;align-items:center;justify-content:center}
.ch-btn:hover{border-color:var(--accent);color:var(--accent)}

/* TASK CONTEXT BANNER */
.task-banner{
  padding:.7rem 1.4rem;background:rgba(79,156,249,.06);border-bottom:1px solid rgba(79,156,249,.15);
  display:flex;align-items:center;gap:.8rem;font-size:.8rem;flex-shrink:0;
}
.task-banner-icon{font-size:1rem}
.task-banner-text{flex:1;color:var(--muted)}
.task-banner-text strong{color:var(--text)}
.task-banner-btn{padding:.3rem .8rem;border-radius:6px;background:rgba(79,156,249,.15);border:1px solid rgba(79,156,249,.3);color:var(--accent);font-size:.73rem;font-weight:700;cursor:pointer;transition:all .2s}
.task-banner-btn:hover{background:rgba(79,156,249,.25)}

/* MESSAGES */
.messages-area{flex:1;overflow-y:auto;padding:1.2rem;display:flex;flex-direction:column;gap:.5rem;scroll-behavior:smooth}
.messages-area::-webkit-scrollbar{width:4px}
.messages-area::-webkit-scrollbar-thumb{background:var(--border2);border-radius:999px}

/* Date separator */
.date-sep{text-align:center;margin:.5rem 0;position:relative}
.date-sep span{background:var(--bg3);border:1px solid var(--border);padding:.2rem .9rem;border-radius:999px;font-size:.68rem;color:var(--muted);position:relative;z-index:1}

/* Bubble */
.msg-wrap{display:flex;flex-direction:column;gap:2px;animation:msgIn .2s ease}
@keyframes msgIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.msg-wrap.mine{align-items:flex-end}
.msg-wrap.theirs{align-items:flex-start}
.msg-sender{font-size:.68rem;color:var(--muted);margin-bottom:.1rem;padding:0 .3rem}
.bubble{
  max-width:65%;padding:.65rem 1rem;border-radius:18px;font-size:.88rem;line-height:1.55;
  position:relative;word-break:break-word;
}
.bubble.mine{background:linear-gradient(135deg,var(--accent),var(--accent2));color:#fff;border-radius:18px 18px 4px 18px}
.bubble.theirs{background:var(--card2);color:var(--text);border-radius:18px 18px 18px 4px}
.msg-time{font-size:.65rem;color:var(--muted);padding:0 .3rem}
.msg-time .read-tick{color:var(--accent);font-size:.7rem}

/* File / image attachment bubble */
.attachment{display:flex;align-items:center;gap:.6rem;background:rgba(255,255,255,.06);padding:.5rem .8rem;border-radius:10px;margin-top:.3rem;cursor:pointer;transition:background .2s}
.attachment:hover{background:rgba(255,255,255,.1)}
.att-icon{font-size:1.2rem}
.att-name{font-size:.8rem;font-weight:600}
.att-size{font-size:.68rem;color:var(--muted)}

/* Typing indicator */
.typing-indicator{display:none;align-items:center;gap:.5rem;padding:.5rem .8rem;font-size:.78rem;color:var(--muted)}
.typing-indicator.show{display:flex}
.typing-dots{display:flex;gap:3px}
.typing-dots span{width:6px;height:6px;border-radius:50%;background:var(--muted);animation:dot 1.2s infinite}
.typing-dots span:nth-child(2){animation-delay:.2s}
.typing-dots span:nth-child(3){animation-delay:.4s}
@keyframes dot{0%,80%,100%{transform:scale(0.6);opacity:.4}40%{transform:scale(1);opacity:1}}

/* INPUT */
.chat-input-area{padding:.9rem 1.2rem;border-top:1px solid var(--border);background:var(--bg2);flex-shrink:0}
.input-row{display:flex;align-items:flex-end;gap:.6rem}
.input-actions{display:flex;gap:.3rem;flex-shrink:0}
.inp-btn{width:34px;height:34px;border-radius:8px;background:var(--bg3);border:1px solid var(--border);color:var(--muted);font-size:1rem;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .2s;flex-shrink:0}
.inp-btn:hover{border-color:var(--accent);color:var(--accent)}
.msg-box{
  flex:1;background:var(--bg3);border:1px solid var(--border);border-radius:12px;
  padding:.65rem 1rem;color:var(--text);font-family:'DM Sans',sans-serif;font-size:.9rem;
  resize:none;outline:none;max-height:120px;min-height:40px;transition:border-color .2s;line-height:1.5;
}
.msg-box:focus{border-color:var(--accent)}
.msg-box::placeholder{color:var(--muted)}
.send-btn{
  width:40px;height:40px;border-radius:10px;flex-shrink:0;
  background:linear-gradient(135deg,var(--accent),var(--accent2));
  border:none;color:#fff;font-size:1.1rem;cursor:pointer;
  transition:all .2s;display:flex;align-items:center;justify-content:center;
}
.send-btn:hover{transform:scale(1.05);box-shadow:0 4px 14px rgba(79,156,249,.4)}

/* Empty state */
.chat-empty{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;color:var(--muted);gap:.8rem}
.chat-empty-icon{font-size:3rem}
.chat-empty h3{font-size:1.1rem;color:var(--text)}
.chat-empty p{font-size:.85rem;max-width:280px;text-align:center}

/* Offer card in chat */
.offer-card{
  background:rgba(62,207,142,.06);border:1px solid rgba(62,207,142,.2);
  border-radius:14px;padding:1rem 1.2rem;max-width:300px;
}
.offer-card-title{font-size:.75rem;font-weight:700;color:var(--green);margin-bottom:.4rem;letter-spacing:.5px;text-transform:uppercase}
.offer-card-val{font-family:'Syne',sans-serif;font-size:1.1rem;font-weight:800;margin-bottom:.4rem}
.offer-card-msg{font-size:.82rem;color:var(--muted);margin-bottom:.8rem}
.offer-btns{display:flex;gap:.5rem}
.offer-accept{padding:.4rem 1rem;border-radius:7px;background:var(--green);color:#000;font-weight:700;font-size:.78rem;border:none;cursor:pointer;transition:opacity .2s}
.offer-accept:hover{opacity:.85}
.offer-decline{padding:.4rem 1rem;border-radius:7px;background:var(--card2);color:var(--muted);font-weight:700;font-size:.78rem;border:1px solid var(--border);cursor:pointer}

@media(max-width:700px){.chat-layout{grid-template-columns:1fr}.rooms-panel{display:none}}
</style>
</head>
<body>

<div class="topbar">
  <a href="dashboard.html" style="text-decoration:none"><button class="back-btn">← Dashboard</button></a>
  <div class="logo">Task<span>Mate</span></div>
  <span style="margin-left:auto;font-size:.8rem;color:var(--muted)">💬 Messages</span>
</div>

<div class="chat-layout">

  <!-- ROOMS PANEL -->
  <div class="rooms-panel">
    <div class="rooms-header">
      <div class="rooms-title">Conversations</div>
      <div class="search-wrap"><span>🔍</span><input placeholder="Search..." id="room-search" oninput="searchRooms(this.value)"></div>
    </div>
    <div class="rooms-list" id="rooms-list"></div>
  </div>

  <!-- CHAT WINDOW -->
  <div class="chat-window" id="chat-window">
    <div class="chat-empty" id="chat-empty">
      <div class="chat-empty-icon">💬</div>
      <h3>Select a conversation</h3>
      <p>Choose a chat from the left panel to start messaging</p>
    </div>

    <div id="chat-active" style="display:none;flex-direction:column;flex:1;overflow:hidden">
      <!-- Header -->
      <div class="chat-header" id="chat-header">
        <div class="ch-ava" id="ch-ava">?</div>
        <div>
          <div class="ch-name" id="ch-name">Name</div>
          <div class="ch-status" id="ch-status">● Online</div>
        </div>
        <div class="ch-actions">
          <button class="ch-btn" title="View task">📋</button>
          <button class="ch-btn" title="Rate user" onclick="showRateModal()">⭐</button>
          <button class="ch-btn" title="More options">⋯</button>
        </div>
      </div>

      <!-- Task banner -->
      <div class="task-banner" id="task-banner">
        <span class="task-banner-icon">📋</span>
        <div class="task-banner-text">Task: <strong id="banner-task">Loading...</strong></div>
        <button class="task-banner-btn">View Task</button>
      </div>

      <!-- Messages -->
      <div class="messages-area" id="messages-area"></div>

      <!-- Typing -->
      <div class="typing-indicator" id="typing-indicator">
        <span id="typing-name">Sara</span> is typing
        <div class="typing-dots"><span></span><span></span><span></span></div>
      </div>

      <!-- Input -->
      <div class="chat-input-area">
        <div class="input-row">
          <div class="input-actions">
            <button class="inp-btn" title="Attach file" onclick="toast('📎','Attach file','File upload available in full app')">📎</button>
            <button class="inp-btn" title="Emoji">😊</button>
          </div>
          <textarea class="msg-box" id="msg-box" placeholder="Type a message..." rows="1"
            onkeydown="handleKey(event)" oninput="autoResize(this)"></textarea>
          <button class="send-btn" onclick="sendMessage()">↗</button>
        </div>
      </div>
    </div>
  </div>
</div>

<!-- RATE MODAL -->
<div id="rate-overlay" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,.7);backdrop-filter:blur(8px);z-index:100;align-items:center;justify-content:center;padding:1rem">
  <div style="background:var(--card);border:1px solid var(--border);border-radius:20px;padding:2rem;max-width:380px;width:100%;animation:rateIn .3s cubic-bezier(.34,1.56,.64,1)">
    <h3 style="font-size:1.2rem;margin-bottom:.3rem">Rate this helper</h3>
    <p style="color:var(--muted);font-size:.85rem;margin-bottom:1.5rem">How was your experience with <span id="rate-name">Sara</span>?</p>
    <div style="display:flex;gap:.5rem;justify-content:center;font-size:2rem;margin-bottom:1.5rem" id="star-row">
      <span class="star" data-v="1" onclick="setRating(1)" style="cursor:pointer;opacity:.4;transition:all .2s">⭐</span>
      <span class="star" data-v="2" onclick="setRating(2)" style="cursor:pointer;opacity:.4;transition:all .2s">⭐</span>
      <span class="star" data-v="3" onclick="setRating(3)" style="cursor:pointer;opacity:.4;transition:all .2s">⭐</span>
      <span class="star" data-v="4" onclick="setRating(4)" style="cursor:pointer;opacity:.4;transition:all .2s">⭐</span>
      <span class="star" data-v="5" onclick="setRating(5)" style="cursor:pointer;opacity:.4;transition:all .2s">⭐</span>
    </div>
    <textarea style="width:100%;background:var(--bg2);border:1px solid var(--border);border-radius:10px;padding:.75rem;color:var(--text);font-family:'DM Sans',sans-serif;font-size:.88rem;resize:none;outline:none;margin-bottom:1rem" rows="3" placeholder="Leave a comment (optional)..." id="rate-comment"></textarea>
    <div style="display:flex;gap:.7rem">
      <button onclick="submitRating()" style="flex:1;background:linear-gradient(135deg,var(--accent),var(--accent2));color:#fff;border:none;padding:.75rem;border-radius:10px;font-family:'Syne',sans-serif;font-weight:700;font-size:.9rem;cursor:pointer">Submit Rating</button>
      <button onclick="hideRateModal()" style="padding:.75rem 1.2rem;background:none;border:1px solid var(--border);border-radius:10px;color:var(--muted);cursor:pointer">Cancel</button>
    </div>
  </div>
</div>
<style>@keyframes rateIn{from{opacity:0;transform:scale(.9)}to{opacity:1;transform:scale(1)}}</style>

<!-- TOAST -->
<div id="toast" style="position:fixed;bottom:1.5rem;right:1.5rem;z-index:200;background:var(--card);border:1px solid var(--border);border-radius:14px;padding:.9rem 1.3rem;display:flex;align-items:center;gap:.75rem;min-width:240px;box-shadow:0 8px 32px rgba(0,0,0,.5);transform:translateX(130%);transition:transform .4s cubic-bezier(.34,1.56,.64,1)">
  <span id="t-icon" style="font-size:1.2rem">🎉</span>
  <div><div id="t-title" style="font-family:'Syne',sans-serif;font-weight:700;font-size:.85rem"></div><div id="t-msg" style="font-size:.75rem;color:var(--muted)"></div></div>
</div>

<script>
// ─── CONFIG ──────────────────────────────────────────
const API = 'https://taskmate-api-e853.onrender.com/api';
const SOCKET_URL = 'https://taskmate-api-e853.onrender.com';
const TOKEN = localStorage.getItem('tm_token') || '';

// ─── DATA ────────────────────────────────────────────
const ROOMS=[
  {id:'r1',name:'Sara M.',ava:'S',color:'#4f9cf9',online:true,unread:2,last:"Hey, can we meet at 4pm?",time:'2m',task:'Design 8-slide pitch deck'},
  {id:'r2',name:'Zaid H.',ava:'Z',color:'#7c5cfc',online:true,unread:0,last:"Done! Sending files now.",time:'1h',task:'Photo editing for college magazine'},
  {id:'r3',name:'Priya S.',ava:'P',color:'#3ecf8e',online:false,unread:0,last:"Thanks a lot! 🙏",time:'3h',task:'Python OOP Assignment'},
  {id:'r4',name:'Dev P.',ava:'D',color:'#f97b4f',online:false,unread:1,last:"Can we reschedule to tomorrow?",time:'5h',task:'React hooks tutoring session'},
  {id:'r5',name:'Nadia A.',ava:'N',color:'#f5c542',online:true,unread:0,last:"Offer accepted! Let's go 🎉",time:'1d',task:'Fourier transforms explanation'},
];

const MESSAGES={
  r1:[
    {type:'date',label:'Today'},
    {id:'m1',mine:false,content:"Hey! Are you available to help with my presentation?",time:'10:02 AM'},
    {id:'m2',mine:true,content:"Yes! What's the topic and how many slides?",time:'10:04 AM',read:true},
    {id:'m3',mine:false,content:"Startup pitch — 8 slides. I have all content ready, just need good design.",time:'10:05 AM'},
    {id:'m4',mine:true,content:"Perfect, I can do that. When's your deadline?",time:'10:06 AM',read:true},
    {id:'m5',mine:false,content:"Tomorrow morning 9am 😬",time:'10:07 AM'},
    {id:'m6',mine:true,content:"No worries, I'll get it done tonight. Share your content doc.",time:'10:08 AM',read:true},
    {id:'m7',type:'offer',mine:false,offerVal:'My Econ notes + ₹50',offerMsg:'For designing the full 8-slide pitch deck by tonight.',time:'10:12 AM'},
    {id:'m8',mine:true,content:"Deal! Accepted. Send over the content and any references you have.",time:'10:13 AM',read:true},
    {id:'m9',mine:false,content:"Sending now! 📎",time:'10:15 AM',attach:{name:'Startup_Content.docx',size:'24 KB'}},
    {id:'m10',mine:false,content:"Hey, can we meet at 4pm?",time:'10:30 AM'},
  ],
  r2:[
    {type:'date',label:'Yesterday'},
    {id:'m1',mine:false,content:"I've finished editing all the photos. Colour corrected and retouched.",time:'4:20 PM'},
    {id:'m2',mine:true,content:"Amazing! Can you send them over?",time:'4:22 PM',read:true},
    {id:'m3',mine:false,content:"Done! Sending files now.",time:'4:25 PM',attach:{name:'Magazine_Photos_Edited.zip',size:'48 MB'}},
    {id:'m4',mine:true,content:"Got them! These look incredible 🔥 Thank you so much!",time:'4:30 PM',read:true},
  ],
  r3:[
    {type:'date',label:'2 days ago'},
    {id:'m1',mine:false,content:"Hi! I saw your task for Python OOP help. I can definitely help.",time:'2:00 PM'},
    {id:'m2',mine:true,content:"Perfect! Can you do it today?",time:'2:05 PM',read:true},
    {id:'m3',mine:false,content:"Yes! Share your starter code and I'll explain everything.",time:'2:08 PM'},
    {id:'m4',mine:true,content:"Here it is, thanks so much in advance!",time:'2:10 PM',read:true},
    {id:'m5',mine:false,content:"Done with the explanations. Everything is commented and a README is included.",time:'5:15 PM'},
    {id:'m6',mine:true,content:"This is perfect!! Exactly what I needed 🙌",time:'5:20 PM',read:true},
    {id:'m7',mine:false,content:"Thanks a lot! 🙏",time:'5:21 PM'},
  ],
};

let activeRoom=null;
let selectedRating=0;

// ─── RENDER ROOMS ─────────────────────────────────────
function renderRooms(list=ROOMS){
  document.getElementById('rooms-list').innerHTML=list.map(r=>`
    <div class="room-item${activeRoom===r.id?' active':''}" onclick="openRoom('${r.id}')">
      <div class="room-ava" style="background:${r.color}">
        ${r.ava}
        ${r.online?'<div class="online-dot"></div>':''}
      </div>
      <div class="room-info">
        <div class="room-name">${r.name}</div>
        <div class="room-last">${r.last}</div>
        <div class="room-task">📋 ${r.task}</div>
      </div>
      <div class="room-meta">
        <div class="room-time">${r.time}</div>
        ${r.unread>0?`<div class="unread-badge">${r.unread}</div>`:''}
      </div>
    </div>`).join('');
}

function searchRooms(q){
  renderRooms(q?ROOMS.filter(r=>r.name.toLowerCase().includes(q.toLowerCase())||r.task.toLowerCase().includes(q.toLowerCase())):ROOMS);
}

// ─── OPEN ROOM ────────────────────────────────────────
function openRoom(id){
  activeRoom=id;
  const room=ROOMS.find(r=>r.id===id);
  if(!room)return;
  room.unread=0;
  renderRooms();

  document.getElementById('chat-empty').style.display='none';
  const active=document.getElementById('chat-active');
  active.style.display='flex';

  document.getElementById('ch-ava').style.background=room.color;
  document.getElementById('ch-ava').textContent=room.ava;
  document.getElementById('ch-name').textContent=room.name;
  document.getElementById('ch-status').textContent=room.online?'● Online':'○ Last seen '+room.time+' ago';
  document.getElementById('ch-status').style.color=room.online?'var(--green)':'var(--muted)';
  document.getElementById('banner-task').textContent=room.task;
  document.getElementById('rate-name').textContent=room.name;

  renderMessages(id);

  // Simulate typing after 2s for first room
  if(id==='r1'){
    setTimeout(()=>{
      document.getElementById('typing-name').textContent=room.name.split(' ')[0];
      document.getElementById('typing-indicator').classList.add('show');
      setTimeout(()=>document.getElementById('typing-indicator').classList.remove('show'),2500);
    },2000);
  }
}

// ─── RENDER MESSAGES ──────────────────────────────────
function renderMessages(id){
  const msgs=MESSAGES[id]||[];
  const area=document.getElementById('messages-area');
  area.innerHTML=msgs.map(m=>{
    if(m.type==='date')return`<div class="date-sep"><span>${m.label}</span></div>`;
    if(m.type==='offer')return offerBubble(m);
    return msgBubble(m);
  }).join('');
  area.scrollTop=area.scrollHeight;
}

function msgBubble(m){
  const att=m.attach?`<div class="attachment"><span class="att-icon">📄</span><div><div class="att-name">${m.attach.name}</div><div class="att-size">${m.attach.size}</div></div><span style="margin-left:auto;font-size:.75rem;color:var(--accent)">↓</span></div>`:'';
  return`<div class="msg-wrap ${m.mine?'mine':'theirs'}">
    <div class="bubble ${m.mine?'mine':'theirs'}">${m.content}${att}</div>
    <div class="msg-time">${m.time}${m.mine&&m.read?' <span class="read-tick">✓✓</span>':''}</div>
  </div>`;
}

function offerBubble(m){
  return`<div class="msg-wrap theirs">
    <div class="offer-card">
      <div class="offer-card-title">💚 Offer Sent</div>
      <div class="offer-card-val">${m.offerVal}</div>
      <div class="offer-card-msg">${m.offerMsg}</div>
      <div class="offer-btns">
        <button class="offer-accept" onclick="acceptOffer(this)">Accept ✓</button>
        <button class="offer-decline" onclick="declineOffer(this)">Decline</button>
      </div>
    </div>
    <div class="msg-time">${m.time}</div>
  </div>`;
}

function acceptOffer(btn){
  btn.textContent='Accepted ✓';btn.style.opacity='.5';btn.disabled=true;
  btn.nextElementSibling.style.display='none';
  toast('🎉','Offer Accepted!','Task is now in progress. Start chatting!');
}
function declineOffer(btn){
  btn.textContent='Declined';btn.style.opacity='.5';btn.disabled=true;
  btn.previousElementSibling.style.display='none';
  toast('❌','Offer Declined','The requester will be notified.');
}

// ─── SEND MESSAGE ─────────────────────────────────────
function sendMessage(){
  const box=document.getElementById('msg-box');
  const val=box.value.trim();
  if(!val||!activeRoom)return;
  const area=document.getElementById('messages-area');
  const now=new Date();
  const time=now.toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'});
  const wrap=document.createElement('div');
  wrap.className='msg-wrap mine';
  wrap.innerHTML=`<div class="bubble mine">${val}</div><div class="msg-time">${time}</div>`;
  area.appendChild(wrap);
  box.value='';box.style.height='40px';
  area.scrollTop=area.scrollHeight;

  // Update last message in room list
  const room=ROOMS.find(r=>r.id===activeRoom);
  if(room){room.last=val;room.time='now';renderRooms();}

  // Simulate reply after random delay
  const replies=["Got it! 👍","Sure, I'll do that.","On it! Will send shortly.","That works for me 🙌","Perfect, thanks!","Give me 10 minutes."];
  setTimeout(()=>{
    const room=ROOMS.find(r=>r.id===activeRoom);if(!room)return;
    const reply=replies[Math.floor(Math.random()*replies.length)];
    const wrap2=document.createElement('div');
    wrap2.className='msg-wrap theirs';
    wrap2.innerHTML=`<div class="bubble theirs">${reply}</div><div class="msg-time">${new Date().toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'})}</div>`;
    // Show typing first
    document.getElementById('typing-name').textContent=room.name.split(' ')[0];
    document.getElementById('typing-indicator').classList.add('show');
    setTimeout(()=>{
      document.getElementById('typing-indicator').classList.remove('show');
      area.appendChild(wrap2);area.scrollTop=area.scrollHeight;
      room.last=reply;room.time='now';renderRooms();
    },1500);
  },1800+Math.random()*1200);
}

function handleKey(e){if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();sendMessage()}}
function autoResize(el){el.style.height='40px';el.style.height=Math.min(el.scrollHeight,120)+'px'}

// ─── RATING ───────────────────────────────────────────
function showRateModal(){
  document.getElementById('rate-overlay').style.display='flex';
  document.getElementById('rate-name').textContent=ROOMS.find(r=>r.id===activeRoom)?.name||'';
}
function hideRateModal(){document.getElementById('rate-overlay').style.display='none'}
function setRating(v){
  selectedRating=v;
  document.querySelectorAll('.star').forEach((s,i)=>s.style.opacity=i<v?'1':'.3');
}
function submitRating(){
  if(!selectedRating){toast('⭐','Select a rating','Please choose 1-5 stars');return}
  hideRateModal();
  toast('⭐','Rating submitted!',`You rated ${ROOMS.find(r=>r.id===activeRoom)?.name} ${selectedRating}/5`);
}

// ─── TOAST ────────────────────────────────────────────
function toast(icon,title,msg){
  document.getElementById('t-icon').textContent=icon;
  document.getElementById('t-title').textContent=title;
  document.getElementById('t-msg').textContent=msg;
  const t=document.getElementById('toast');t.style.transform='translateX(0)';
  setTimeout(()=>t.style.transform='translateX(130%)',3500);
}

// ─── INIT ─────────────────────────────────────────────
renderRooms();
setTimeout(()=>openRoom('r1'),300);
</script>
